<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>本棚並び替えゲーム（1〜100）</title>
  <style>
    body{font-family: system-ui,-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif; margin:18px;}
    h1{margin:0 0 8px; font-size:20px;}
    .small{color:#555; font-size:13px; line-height:1.45;}
    .top{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0 14px;}
    .pill{display:inline-block; border:1px solid #bbb; border-radius:999px; padding:6px 10px; background:#fafafa;}
    button{padding:10px 12px; border:1px solid #666; border-radius:12px; background:#fff; cursor:pointer;}
    button:disabled{opacity:.5; cursor:not-allowed;}
    .wrap{display:grid; grid-template-columns: 1fr 320px; gap:14px; align-items:start;}
    @media (max-width: 980px){ .wrap{grid-template-columns:1fr;} }
    .shelf{
      border:1px solid #ddd; border-radius:14px; padding:12px; background:#fff;
      display:grid; grid-template-columns: repeat(10, minmax(0, 1fr)); gap:8px;
      user-select:none;
      touch-action: none;
    }
    .book{
      border:1px solid #999; border-radius:10px; background:#fff;
      height:56px; display:flex; align-items:center; justify-content:center;
      font-weight:700; cursor:grab;
      box-shadow: 0 1px 0 rgba(0,0,0,.04);
    }
    .book:active{cursor:grabbing;}
    .book.dragging{opacity:.4;}
    .book.over{outline:3px solid rgba(0,120,255,.35);}
    .ghost{
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: .85;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }
    .panel{border:1px solid #ddd; border-radius:14px; padding:12px; background:#fff;}
    .big{font-size:22px; font-weight:800;}
    .ok{color:#0a7; font-weight:800;}
    .warn{color:#b80; font-weight:700;}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;}
    .hint{margin-top:10px; font-size:12px; color:#666;}
    .stats{display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px;}
    .stat{border:1px solid #eee; border-radius:12px; padding:10px; background:#fafafa;}
  </style>
</head>
<body>
  <h1>本棚並び替えゲーム</h1>
  <div class="small">冊数（5〜100）を選ぶと、その数だけ本（1〜N）がランダムに並びます。ドラッグして入れ替えて、1〜100の順に並べたらクリア！</div>

  <div class="top">
    <span class="pill">⏱ タイマー：<span id="time" class="mono">00:00.0</span></span>
    <span class="pill">🔁 手数：<span id="moves" class="mono">0</span></span>

    <span class="pill">📚 冊数：
      <input id="count" type="number" min="5" max="100" step="1" value="100"
        style="width:88px; padding:4px 8px; border:1px solid #bbb; border-radius:10px; font-size:13px;">
    </span>

    <button id="start">スタート（シャッフルして開始）</button>
    <button id="shuffle">シャッフル</button>
    <button id="reset" class="warn">リセット（1〜100順）</button>
  </div>

  <div class="wrap">
    <div>
      <div id="shelf" class="shelf" aria-label="bookshelf"></div>
      <div id="msg" class="hint"></div>
    </div>

    <div class="panel">
      <div class="big">目標</div>
      <div style="margin-top:6px;">左上から右へ、上から下へ</div>
      <div class="mono" style="margin-top:6px;">1, 2, 3, …, <span id="goalMax">100</span></div>

      <div class="stats">
        <div class="stat">
          <div class="small">現在の正解率</div>
          <div class="big"><span id="accuracy">0</span>%</div>
        </div>
        <div class="stat">
          <div class="small">連続正解（先頭から）</div>
          <div class="big"><span id="streak">0</span></div>
        </div>
      </div>

      <div class="hint">
        コツ：<br>
        ・本をドラッグして、置きたい本の上でドロップすると<b>入れ替え</b>になります。<br>
        ・タイマーは「スタート」か、最初の操作で動きます。<br>・スマホ/iPadは指でドラッグして入れ替えできます。
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
